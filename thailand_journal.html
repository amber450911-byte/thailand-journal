<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>泰國出差日誌 · 2025</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #036D9A;
    --blue-dark: #025580;
    --blue-light: #e8f4fa;
    --yellow: #FDEA6F;
    --yellow-dark: #8a7000;
    --red: #CF0000;
    --red-light: #fff0f0;
    --bg: #f5f8fb;
    --surface: #ffffff;
    --border: #036D9A22;
    --text: #1a1a1a;
    --text-muted: #888;
    --radius: 10px;
    --sidebar-w: 210px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Layout ── */
  .app { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--blue);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 20px 16px 14px;
    border-bottom: 1px solid #ffffff22;
    flex-shrink: 0;
  }

  .trip-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--yellow);
    color: var(--blue);
    font-size: 11px;
    font-weight: 700;
    padding: 4px 9px;
    border-radius: 6px;
    margin-bottom: 10px;
    letter-spacing: 0.03em;
  }

  .sidebar-title { font-size: 15px; font-weight: 700; color: #fff; }
  .sidebar-sub { font-size: 11px; color: #ffffffaa; margin-top: 3px; }

  .date-list { flex: 1; overflow-y: auto; padding: 6px 0; }
  .date-list::-webkit-scrollbar { width: 4px; }
  .date-list::-webkit-scrollbar-track { background: transparent; }
  .date-list::-webkit-scrollbar-thumb { background: #ffffff33; border-radius: 2px; }

  .date-item {
    display: flex;
    align-items: center;
    padding: 9px 16px;
    cursor: pointer;
    color: #ffffffbb;
    border-left: 3px solid transparent;
    transition: all 0.12s;
    gap: 9px;
    user-select: none;
  }
  .date-item:hover { background: #ffffff18; color: #fff; }
  .date-item.active { background: #ffffff20; color: var(--yellow); border-left-color: var(--yellow); }

  .date-item .day-num { font-size: 16px; font-weight: 700; min-width: 24px; }
  .date-item .day-label { flex: 1; font-size: 13px; }
  .date-item .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--yellow); opacity: 0; flex-shrink: 0; transition: opacity 0.2s; }
  .date-item.has-entry .dot { opacity: 1; }

  /* ── Main ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .topbar {
    padding: 13px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    flex-shrink: 0;
  }

  .topbar-date { font-size: 16px; font-weight: 700; color: var(--blue); }

  .topbar-actions { display: flex; align-items: center; gap: 10px; }

  .mode-toggle {
    display: flex;
    border: 1px solid var(--blue);
    border-radius: 7px;
    overflow: hidden;
  }
  .mode-btn {
    padding: 5px 13px;
    font-size: 12px;
    color: var(--blue);
    background: transparent;
    border: none;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.1s;
  }
  .mode-btn.active { background: var(--blue); color: var(--yellow); font-weight: 700; }

  .save-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 16px;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .save-btn:hover { background: var(--blue-dark); }
  .save-btn.saved { background: #eee; color: #aaa; border: 1px solid #ddd; cursor: default; }

  /* ── Sections ── */
  .sections {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 13px;
  }
  .sections::-webkit-scrollbar { width: 5px; }
  .sections::-webkit-scrollbar-track { background: transparent; }
  .sections::-webkit-scrollbar-thumb { background: #036D9A33; border-radius: 3px; }

  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 1px 4px #036D9A0a;
  }

  .section-label {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 9px 14px;
    border-bottom: 1px solid var(--border);
  }
  .section-label.work    { background: #036D9A0d; }
  .section-label.visit   { background: #CF000009; }
  .section-label.learned { background: #FDEA6F22; }
  .section-label.tomorrow{ background: #036D9A07; }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
  }
  .section-title.work     { color: var(--blue); }
  .section-title.visit    { color: var(--red); }
  .section-title.learned  { color: var(--yellow-dark); }
  .section-title.tomorrow { color: var(--blue); }

  .section-icon { font-size: 15px; }

  .section textarea {
    width: 100%;
    padding: 12px 14px;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    background: transparent;
    border: none;
    resize: none;
    min-height: 80px;
    outline: none;
  }
  .section textarea::placeholder { color: #ccc; }

  .preview-area {
    padding: 12px 14px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    min-height: 80px;
  }
  .preview-area h2 { font-size: 14px; font-weight: 700; color: var(--blue); margin-bottom: 5px; }
  .preview-area strong { font-weight: 700; }
  .preview-area ul { padding-left: 18px; margin: 4px 0; }
  .preview-area li { margin-bottom: 3px; }
  .preview-area p { margin-bottom: 5px; }
  .preview-area p:last-child { margin-bottom: 0; }
  .empty-preview { color: #ccc; font-size: 13px; font-style: italic; }

  /* ── Footer ── */
  .footer-bar {
    padding: 8px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .md-hint { font-size: 11px; color: #bbb; }
  .md-hint code {
    background: #f4f4f4;
    padding: 1px 5px;
    border-radius: 4px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 10px;
    color: #666;
  }

  /* ── Empty state ── */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: #ccc;
  }
  .empty-state svg { opacity: 0.3; }
  .empty-state p { font-size: 14px; }

  /* ── Export button ── */
  .export-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: var(--yellow);
    color: #5a4a00;
    border: none;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .export-btn:hover { background: #f5df50; }

  /* ── Export modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: #00000055;
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .modal {
    background: var(--surface);
    border-radius: 12px;
    width: 600px; max-width: 92vw;
    max-height: 80vh;
    display: flex; flex-direction: column;
    box-shadow: 0 8px 40px #00000033;
    overflow: hidden;
  }
  .modal-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--blue);
  }
  .modal-title { font-size: 15px; font-weight: 700; color: #fff; }
  .modal-close {
    background: transparent; border: none; color: #ffffffaa;
    font-size: 20px; cursor: pointer; line-height: 1;
  }
  .modal-close:hover { color: #fff; }
  .modal-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .modal-textarea {
    width: 100%; height: 320px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px; line-height: 1.6;
    color: var(--text); background: #f8f9fa;
    border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px; resize: none; outline: none;
  }
  .modal-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: #fafafa;
  }
  .modal-hint { font-size: 12px; color: var(--text-muted); }
  .copy-btn {
    padding: 7px 18px;
    background: var(--blue); color: #fff;
    border: none; border-radius: 7px;
    font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .copy-btn:hover { background: var(--blue-dark); }
  .copy-btn.copied { background: #1a9e6e; }

  /* ── Mobile ── */
  @media (max-width: 600px) {
    :root { --sidebar-w: 160px; }
    .topbar-date { font-size: 14px; }
    .sections { padding: 12px 14px; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="trip-badge">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
        泰國出差
      </div>
      <div class="sidebar-title">工作日誌</div>
      <div class="sidebar-sub">7/19 – 7/31 · 13 天</div>
    </div>
    <div class="date-list" id="dateList"></div>
    <div style="padding:12px 14px;border-top:1px solid #ffffff22;">
      <button class="export-btn" style="width:100%;justify-content:center;" onclick="openExport()">📋 匯出日誌</button>
    </div>
  </div>

  <!-- Main -->
  <div class="main" id="mainPanel">
    <div class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#036D9A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
      </svg>
      <p>選擇左側日期開始記錄</p>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'thai_journal_2025_';
const DAYS = ['日','一','二','三','四','五','六'];
const SECTIONS = [
  { key: 'work',     label: '今日工作',       cls: 'work',     icon: '💼', placeholder: '今天完成了什麼？參加了哪些會議或任務？' },
  { key: 'visit',    label: 'Visit · 客戶參訪', cls: 'visit',    icon: '🏢', placeholder: '拜訪了哪個客戶？談了什麼、有什麼收穫或後續行動？' },
  { key: 'learned',  label: '學到什麼',        cls: 'learned',  icon: '💡', placeholder: '學到了新技能、知識或觀察？' },
  { key: 'tomorrow', label: '明日計畫',        cls: 'tomorrow', icon: '→',  placeholder: '明天的重點是什麼？' },
];

const DATES = [];
const start = new Date(2025, 6, 19);
for (let i = 0; i < 13; i++) {
  const d = new Date(start);
  d.setDate(start.getDate() + i);
  DATES.push(d);
}

let currentDate = null;
let mode = 'edit';
let entries = {};
let savedEntries = {};

function formatKey(d) {
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}

function loadAll() {
  DATES.forEach(d => {
    const k = formatKey(d);
    try {
      const raw = localStorage.getItem(STORAGE_KEY + k);
      if (raw) {
        entries[k] = JSON.parse(raw);
        savedEntries[k] = raw;
      }
    } catch(e) {}
  });
  renderSidebar();
}

function hasEntry(d) {
  const k = formatKey(d);
  return entries[k] && SECTIONS.some(s => (entries[k][s.key] || '').trim());
}

function renderSidebar() {
  const list = document.getElementById('dateList');
  list.innerHTML = '';
  DATES.forEach(d => {
    const k = formatKey(d);
    const isActive = currentDate && formatKey(currentDate) === k;
    const el = document.createElement('div');
    el.className = 'date-item' + (hasEntry(d) ? ' has-entry' : '') + (isActive ? ' active' : '');
    el.innerHTML = `<span class="day-num">${d.getDate()}</span><span class="day-label">週${DAYS[d.getDay()]}</span><span class="dot"></span>`;
    el.onclick = () => selectDate(d);
    list.appendChild(el);
  });
}

function selectDate(d) {
  currentDate = d;
  mode = 'edit';
  renderMain();
  renderSidebar();
}

function parseMarkdown(text) {
  if (!text || !text.trim()) return '';
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/g, m => `<ul>${m}</ul>`)
    .split('\n')
    .map(l => /^<[hul]/.test(l.trim()) ? l : `<p>${l}</p>`)
    .join('');
}

function renderMain() {
  const panel = document.getElementById('mainPanel');
  if (!currentDate) return;
  const k = formatKey(currentDate);
  if (!entries[k]) entries[k] = {};
  const e = entries[k];
  const isSaved = (savedEntries[k] || '{}') === JSON.stringify(e);

  panel.innerHTML = `
    <div class="topbar">
      <div class="topbar-date">7月${currentDate.getDate()}日（週${DAYS[currentDate.getDay()]}）</div>
      <div class="topbar-actions">
        <div class="mode-toggle">
          <button class="mode-btn ${mode==='edit'?'active':''}" onclick="setMode('edit')">編輯</button>
          <button class="mode-btn ${mode==='preview'?'active':''}" onclick="setMode('preview')">預覽</button>
        </div>
        <button class="save-btn ${isSaved?'saved':''}" id="saveBtn" onclick="saveEntry()">
          ${isSaved ? '✓ 已儲存' : '↓ 儲存'}
        </button>
      </div>
    </div>
    <div class="sections" id="sectionsArea"></div>
    <div class="footer-bar">
      <span class="md-hint">Markdown：<code>**粗體**</code> <code>## 標題</code> <code>- 清單</code></span>
    </div>
  `;

  const area = document.getElementById('sectionsArea');
  SECTIONS.forEach(s => {
    const sec = document.createElement('div');
    sec.className = 'section';
    const labelHtml = `<div class="section-label ${s.cls}"><span class="section-icon">${s.icon}</span><span class="section-title ${s.cls}">${s.label}</span></div>`;

    if (mode === 'edit') {
      sec.innerHTML = labelHtml + `<textarea placeholder="${s.placeholder}" id="f_${s.key}">${(e[s.key] || '')}</textarea>`;
      area.appendChild(sec);
      const ta = sec.querySelector('textarea');
      autoResize(ta);
      ta.addEventListener('input', ev => {
        entries[k][s.key] = ev.target.value;
        updateSaveBtn();
        autoResize(ev.target);
      });
    } else {
      const html = parseMarkdown(e[s.key]);
      sec.innerHTML = labelHtml + `<div class="preview-area">${html || '<span class="empty-preview">（尚無內容）</span>'}</div>`;
      area.appendChild(sec);
    }
  });
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.max(80, el.scrollHeight) + 'px';
}

function setMode(m) { mode = m; renderMain(); }

function updateSaveBtn() {
  const k = formatKey(currentDate);
  const btn = document.getElementById('saveBtn');
  if (!btn) return;
  const isSaved = (savedEntries[k] || '{}') === JSON.stringify(entries[k]);
  btn.className = 'save-btn' + (isSaved ? ' saved' : '');
  btn.textContent = isSaved ? '✓ 已儲存' : '↓ 儲存';
}

function saveEntry() {
  if (!currentDate) return;
  const k = formatKey(currentDate);
  const raw = JSON.stringify(entries[k]);
  localStorage.setItem(STORAGE_KEY + k, raw);
  savedEntries[k] = raw;
  renderSidebar();
  updateSaveBtn();
}

function openExport() {
  const DAYS = ['日','一','二','三','四','五','六'];
  let text = '# 泰國出差工作日誌 2025\n';
  text += '期間：7/19 – 7/31\n\n';
  text += '='.repeat(40) + '\n\n';

  let hasAny = false;
  DATES.forEach(d => {
    const k = formatKey(d);
    const e = entries[k];
    if (!e || !SECTIONS.some(s => (e[s.key] || '').trim())) return;
    hasAny = true;
    text += `## 7月${d.getDate()}日（週${DAYS[d.getDay()]}）\n\n`;
    SECTIONS.forEach(s => {
      const val = (e[s.key] || '').trim();
      if (val) text += `【${s.label}】\n${val}\n\n`;
    });
    text += '-'.repeat(40) + '\n\n';
  });

  if (!hasAny) text += '（尚無日誌內容）\n';

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">📋 匯出日誌 — 複製後貼給 Claude 做 PPT</span>
        <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
      </div>
      <div class="modal-body">
        <textarea class="modal-textarea" id="exportText" readonly>${text}</textarea>
      </div>
      <div class="modal-footer">
        <span class="modal-hint">全選後複製，貼給 Claude 說「幫我做成 PPT」</span>
        <button class="copy-btn" id="copyBtn" onclick="copyExport()">複製全部</button>
      </div>
    </div>
  `;
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
  document.getElementById('exportText').select();
}

function copyExport() {
  const ta = document.getElementById('exportText');
  ta.select();
  navigator.clipboard.writeText(ta.value).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ 已複製！';
    btn.className = 'copy-btn copied';
    setTimeout(() => { btn.textContent = '複製全部'; btn.className = 'copy-btn'; }, 2000);
  });
}

loadAll();
</script>
</body>
</html>
